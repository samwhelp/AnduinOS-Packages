stages:
  - lint
  - publish
  - meta

variables:
  APKG_SERVER: "https://apkg-dev.aiursoft.com"
  APKG_API_KEY: $APKG_DEV_API_KEY

.lint:
  stage: lint
  before_script:
    - dotnet tool update -g aiursoft.apkg.client --configfile ./nuget.config || dotnet tool install -g aiursoft.apkg.client --configfile ./nuget.config
    - export PATH="$PATH:$HOME/.dotnet/tools"
    - apkg --version
  script:
    - cd $PACKAGE_DIR
    - apkg lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH != "master"

.publish:
  stage: publish
  before_script:
    - dotnet tool update -g aiursoft.apkg.client --configfile ./nuget.config || dotnet tool install -g aiursoft.apkg.client --configfile ./nuget.config
    - export PATH="$PATH:$HOME/.dotnet/tools"
    - apkg --version
  script:
    - cd $PACKAGE_DIR
    - apkg publish
    - APKG_FILE=$(ls bin/*.apkg 2>/dev/null | head -1)
    - '[ -n "$APKG_FILE" ] && apkg push -f "$APKG_FILE" -s "$APKG_SERVER" -k "$APKG_API_KEY" --skip-duplicate'
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

