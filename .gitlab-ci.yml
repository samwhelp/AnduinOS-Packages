# ── Onion-layer metapackages ─────────────────────────────────────────────
# anduinos-core-system: no internal deps (pure Ubuntu packages)
# anduinos-desktop-core: depends on core-system
# anduinos-appstore:       Flatpak + GNOME Software (optional for servers)

anduinos-core-system:
  extends: .publish
  variables:
    PACKAGE_DIR: anduinos-core-system

anduinos-desktop-core:
  extends: .publish
  stage: meta
  needs:
    - anduinos-core-system
    - anduinos-session
    - firmware-sof-anduinos
    - alsa-ucm-conf-anduinos
  variables:
    PACKAGE_DIR: anduinos-desktop-core

anduinos-appstore:
  extends: .publish
  variables:
    PACKAGE_DIR: anduinos-appstore

# ── Meta-packages: must wait for their dependencies ──────────────────────

