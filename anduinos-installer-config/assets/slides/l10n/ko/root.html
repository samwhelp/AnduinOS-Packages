<div class="header">
    <h1 class="slidetitle">전체 액세스, 오픈 소스</h1>
</div>
<div class="main">
    <div class="text">
        <div>
            <p>AnduinOS는 GPL 라이선스를 기반으로 하며, 누구나 언제든지 <a href="https://github.com/aiursoftweb/anduinos-2">소스 코드</a>를 조회하고 수정할 수 있습니다.</p>
        </div>
        <div>
            <p>AnduinOS는 사용자에게 컴퓨터에 대한 완벽한 제어권을 제공합니다. 기본적으로 사용자에게 루트(root) 권한이 부여됩니다. sudo 명령을 사용하여 언제든지 모든 명령을 실행할 수 있습니다. 사용자는 컴퓨터에 대해 항상 최고 수준의 제어권을 보유합니다.</p>
        </div>
</div>
