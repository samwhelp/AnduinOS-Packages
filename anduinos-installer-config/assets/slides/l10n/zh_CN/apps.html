<div class="header">
    <h1 class="slidetitle">三层软件架构，一种流畅体验</h1>
</div>
<div class="main">
    <div class="text">
        <div>
            <p>AnduinOS 采用清晰的三层方法进行软件包管理。基础系统依赖 <a href="https://ubuntu.com/">Ubuntu</a> 软件包以提供稳定的核心，而 AnduinOS 特定组件则通过 <a href="https://github.com/aiursoftweb/apkg">Apkg</a>（我们自己的轻量级软件包工具）进行管理。</p>
        </div>
        <div>
            <p>对于面向用户的应用程序，我们用 <a href="https://flatpak.org/">Flatpak</a> 取代了 Snap，以实现沙盒化和跨发行版的应用交付。这能保持应用程序与系统隔离，节省磁盘空间，并让您访问庞大的应用目录。当然，当您有需求时，<a href="https://appimage.org/">AppImage</a> 和传统的 <a href="https://wiki.debian.org/Apt">APT</a> 始终可用。</p>
        </div>
    </div>

</div>
