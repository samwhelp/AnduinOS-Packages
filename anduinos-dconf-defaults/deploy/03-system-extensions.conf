# AnduinOS System Extension Dconf Configuration
# Apkg-packaged extensions ship their own dconf fragments under
# /etc/dconf/db/anduinos.d/ (numbered 08-19).

# ============================================================================
# Extension List Extension
# ============================================================================
[org/gnome/shell/extensions/extension-list]
button-icon=uint32 1
toggle-unpin=false

# ============================================================================
# User Theme Extension
# ============================================================================
[org/gnome/shell/extensions/user-theme]
name='Fluent-round-Dark'
